<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111128"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="white" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="white" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="white" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="white" stroke-opacity="0.02" stroke-width="1"/>
  <!-- Glow orb -->
  <ellipse cx="400" cy="225" rx="280" ry="180" fill="url(#glow)"/>
  <!-- Image frame icon -->
  <rect x="326" y="162" width="148" height="108" rx="10" fill="none" stroke="url(#frameGrad)" stroke-width="1.5"/>
  <!-- Sun/circle in frame -->
  <circle cx="356" cy="192" r="14" fill="none" stroke="#6366f1" stroke-opacity="0.45" stroke-width="1.5"/>
  <!-- Mountain/landscape in frame -->
  <polyline points="326,250 366,208 396,232 420,214 474,270" fill="none" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Clip the polyline to the frame -->
  <!-- Label -->
  <text x="400" y="318" text-anchor="middle" fill="#6366f1" fill-opacity="0.25" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.15em">PROJECT PREVIEW</text>
</svg>
